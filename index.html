<style>
:root {
  --soil: #3d2b1f;
  --bark: #5c3d2e;
  --moss: #2d5a27;
  --leaf: #4a7c3f;
  --sprout: #7fb069;
  --dew: #b8d4a8;
  --rice: #f5f0e0;
  --cream: #faf7f0;
  --gold: #c8943a;
  --harvest: #e8b84b;
  --earth: #8b6f4e;
  --clay: #c4956a;
  --sky: #d4e8c2;
  --mist: rgba(255,255,255,0.85);
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family: 'Sarabun', sans-serif;
  background: var(--cream);
  color: var(--soil);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== HERO HEADER ===== */
.hero {
  position: relative;
  min-height: 480px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 24px 80px;
  overflow: hidden;
  background: var(--moss);
}

.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 120% 80% at 50% 110%, #1a3a15 0%, transparent 60%),
    radial-gradient(ellipse 80% 60% at 20% 0%, #3d7a35 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 20%, #2d5a27 0%, transparent 40%);
}

.hero-stalks {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 0;
  pointer-events: none;
  z-index: 1;
}
.stalk {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.stalk-stem {
  width: 2px;
  background: linear-gradient(to top, #7fb069, #5a9e4f);
  border-radius: 1px;
  animation: sway 3s ease-in-out infinite;
}
.stalk-head {
  width: 6px;
  border-radius: 3px 3px 0 0;
  background: var(--harvest);
  margin-bottom: 2px;
}
@keyframes sway {
  0%,100% { transform: rotate(-3deg) translateX(0); }
  50% { transform: rotate(3deg) translateX(2px); }
}

.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(200,148,58,0.25);
  animation: float linear infinite;
  pointer-events: none;
}
@keyframes float {
  0% { transform: translateY(0) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.5; }
  100% { transform: translateY(-500px) rotate(360deg); opacity: 0; }
}

.hero-emblem {
  position: relative; z-index: 2;
  width: 96px; height: 96px;
  border-radius: 50%;
  background: var(--gold);
  border: 4px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Kanit', sans-serif;
  font-size: 22px; font-weight: 900;
  color: var(--soil);
  margin-bottom: 20px;
  box-shadow: 0 0 0 8px rgba(200,148,58,0.2), 0 0 40px rgba(200,148,58,0.15);
  animation: pulse-ring 4s ease-in-out infinite;
}
@keyframes pulse-ring {
  0%,100% { box-shadow: 0 0 0 8px rgba(200,148,58,0.2), 0 0 40px rgba(200,148,58,0.15); }
  50% { box-shadow: 0 0 0 16px rgba(200,148,58,0.08), 0 0 60px rgba(200,148,58,0.2); }
}

.hero-subtitle {
  position: relative; z-index: 2;
  font-size: 13px; font-weight: 400;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.hero-title {
  position: relative; z-index: 2;
  font-family: 'Kanit', sans-serif;
  font-size: clamp(26px, 5vw, 42px);
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 8px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.hero-title span {
  color: var(--harvest);
  font-style: italic;
  font-family: 'Playfair Display', serif;
}
.hero-tag {
  position: relative; z-index: 2;
  display: inline-block;
  background: rgba(200,148,58,0.2);
  border: 1px solid rgba(200,148,58,0.5);
  color: var(--harvest);
  font-size: 13px; font-weight: 600;
  padding: 6px 20px;
  border-radius: 30px;
  margin-top: 16px;
  letter-spacing: 0.05em;
}

/* ===== STATS BANNER ===== */
.stats-banner {
  background: var(--soil);
  padding: 0;
  position: relative;
  z-index: 10;
  margin-top: -2px;
}
.stats-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}
.stat-item {
  padding: 20px 24px;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.08);
  position: relative;
  overflow: hidden;
}
