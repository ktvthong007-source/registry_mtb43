<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Google Form Realtime</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:30px;
}

.container{
  max-width:1200px;
  margin:auto;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h1{
  margin-top:0;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

.stat{
  background:#2d5a27;
  color:#fff;
  border-radius:14px;
  padding:20px;
  text-align:center;
}

.stat h2{
  margin:0;
  font-size:40px;
}

.stat p{
  margin:6px 0 0;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #ddd;
  text-align:left;
}

.loading{
  text-align:center;
  padding:30px;
}

iframe{
  width:100%;
  height:900px;
  border:none;
  border-radius:12px;
}

@media(max-width:768px){
  .stats{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>
<body>

<div class="container">

  <div class="card">
    <h1>ลงทะเบียนเข้าเยี่ยมชมศูนย์เกษตรฯ</h1>

    <!-- GOOGLE FORM -->
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSf2Gi3EtGqlX9nze8uXcdh9vei-WwsAg_JT7a0xtgzV9uGC8Q/viewform?embedded=true">
    </iframe>
  </div>

  <div class="card">
    <h2>สถิติแบบ Real-time</h2>

    <div class="stats">
      <div class="stat">
        <h2 id="total">0</h2>
        <p>ผู้ลงทะเบียนทั้งหมด</p>
      </div>

      <div class="stat">
        <h2 id="today">0</h2>
        <p>ลงทะเบียนวันนี้</p>
      </div>

      <div class="stat">
        <h2 id="groups">0</h2>
        <p>ประเภทหน่วยงาน</p>
      </div>

      <div class="stat">
        <h2 id="provinces">0</h2>
        <p>จังหวัด</p>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>ผู้ลงทะเบียนล่าสุด</h2>

    <div id="loading" class="loading">
      กำลังโหลดข้อมูล...
    </div>

    <table id="table" style="display:none;">
      <thead>
        <tr>
          <th>เวลา</th>
          <th>ชื่อ</th>
          <th>หน่วยงาน</th>
          <th>จังหวัด</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script>

/*
=====================================================
วิธีใช้งาน

1. เปิด Google Form
2. กด Responses
3. กด Link ไป Spreadsheet
4. เปิด Spreadsheet
5. File > Share > Publish to web
6. Publish Sheet1 เป็น CSV

นำ URL CSV มาใส่ด้านล่าง
=====================================================
*/

const SHEET_CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5yc3WgZx3XEP3toJ3B2twi9EtOP7nOegO_tEmto9iMBkGpuhV5wAbhYxPq6RhOn2nV0VyyGqtOrvz/pub?output=csv';


async function loadData(){

  try{

    const res = await fetch(SHEET_CSV_URL);

    const csv = await res.text();

    const rows = parseCSV(csv);

    render(rows);

  }catch(err){

    document.getElementById('loading').innerHTML =
      'โหลดข้อมูลไม่สำเร็จ<br><br>' + err.message;

    console.error(err);

  }

}


function parseCSV(text){

  const lines = text.split('\n');

  const data = [];

  for(let i=1;i<lines.length;i++){

    const row = lines[i].trim();

    if(!row) continue;

    const cols = splitCSV(row);

    data.push(cols);
  }

  return data;
}


function splitCSV(row){

  const result = [];

  let current = '';

  let inQuotes = false;

  for(let i=0;i<row.length;i++){

    const char = row[i];

    if(char === '"'){

      inQuotes = !inQuotes;

    }else if(char === ',' && !inQuotes){

      result.push(current);

      current = '';

    }else{

      current += char;
    }
  }

  result.push(current);

  return result;
}


function render(rows){

  document.getElementById('loading').style.display='none';

  document.getElementById('table').style.display='table';

  // ===== สถิติ =====

  document.getElementById('total').innerText =
    rows.length;

  // วันนี้
  const today = new Date();

  const todayCount = rows.filter(r=>{

    const d = new Date(r[0]);

    return d.toDateString() === today.toDateString();

  }).length;

  document.getElementById('today').innerText =
    todayCount;

  // ประเภทหน่วยงาน
  const groups = new Set();

  rows.forEach(r=>{

    if(r[3]) groups.add(r[3]);

  });

  document.getElementById('groups').innerText =
    groups.size;

  // จังหวัด
  const provinces = new Set();

  rows.forEach(r=>{

    if(r[4]) provinces.add(r[4]);

  });

  document.getElementById('provinces').innerText =
    provinces.size;

  // ===== ตารางล่าสุด =====

  const tbody = document.getElementById('tbody');

  tbody.innerHTML = '';

  rows.reverse().slice(0,10).forEach(r=>{

    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${r[0] || '-'}</td>
      <td>${r[2] || '-'}</td>
      <td>${r[3] || '-'}</td>
      <td>${r[4] || '-'}</td>
    `;

    tbody.appendChild(tr);

  });

}


// โหลดครั้งแรก
loadData();

// รีเฟรชทุก 60 วินาที
setInterval(loadData,60000);

</script>

</body>
</html>
